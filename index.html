<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>今天你还款了吗？· 动态欠款管家</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #e4f3ec 0%, #cde8dd 100%);
            font-family: 'Inter', sans-serif;
            padding: 2rem 1.5rem;
            color: #1b3e30;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .card {
            background: rgba(255,255,255,0.96);
            border-radius: 2rem;
            box-shadow: 0 16px 32px rgba(30,58,47,0.12);
            padding: 1.8rem 2rem;
            border: 1px solid rgba(70,130,100,0.25);
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #1f6e43, #2f8b60);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        /* 重点：剩余欠款超大卡片 */
        .remaining-hero {
            background: linear-gradient(135deg, #1f6e43 0%, #2f8b60 100%);
            border-radius: 2rem;
            padding: 2rem 2rem;
            margin-bottom: 2rem;
            text-align: center;
            box-shadow: 0 20px 35px rgba(30,70,50,0.25);
        }
        .remaining-label {
            font-size: 1rem;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.8);
            text-transform: uppercase;
            font-weight: 500;
        }
        .remaining-number {
            font-size: 4.5rem;
            font-weight: 800;
            color: white;
            line-height: 1.2;
            letter-spacing: -2px;
            margin: 0.5rem 0;
        }
        .remaining-number small { font-size: 1.5rem; font-weight: 500; }
        .remaining-note {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.7);
        }
        /* 双录入区域 */
        .double-form {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .form-box {
            flex: 1;
            background: #f9fefb;
            border-radius: 1.5rem;
            padding: 1.2rem 1.5rem;
            border: 1px solid #cce6db;
        }
        .form-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }
        .form-row input, .form-row select {
            flex: 1;
            padding: 0.7rem 1rem;
            border-radius: 2rem;
            border: 1.5px solid #cce6db;
            font-size: 0.9rem;
            outline: none;
        }
        .form-row input:focus { border-color: #2f8b60; }
        .btn {
            background: #2a8c5e;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #2a8c5e;
            color: #2a8c5e;
        }
        .btn-outline:hover { background: #e2f3ea; }
        .btn-danger { background: #c27e6f; }
        .btn-danger:hover { background: #b1624b; }
        .action-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            justify-content: flex-end;
            margin-bottom: 1rem;
        }
        .charts-row {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            margin-bottom: 2rem;
        }
        .chart-box { flex: 1; min-width: 280px; }
        canvas { max-height: 300px; width: 100%; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th, td {
            text-align: left;
            padding: 0.7rem 0.4rem;
            border-bottom: 1px solid #d9eadf;
        }
        .delete-btn {
            background: none;
            border: none;
            color: #bf7a67;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .badge {
            background: #eef6f1;
            border-radius: 1rem;
            padding: 0.2rem 0.8rem;
            font-size: 0.7rem;
        }
        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: #5f8a74;
            margin-top: 2rem;
        }
        @media (max-width: 700px) {
            body { padding: 1rem; }
            .remaining-number { font-size: 2.8rem; }
            .double-form { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div style="display: flex; justify-content: space-between; flex-wrap: wrap; align-items: center; margin-bottom: 1rem;">
            <h1>🌱 今天你还款了吗？</h1>
            <div class="action-bar">
                <button class="btn btn-outline" id="exportCsvBtn">📎 导出CSV</button>
                <button class="btn btn-outline" id="exportExcelBtn">📊 导出Excel</button>
                <button class="btn btn-outline" id="resetBtn">🔄 重置所有数据</button>
            </div>
        </div>

        <!-- 🔥 重点：剩余欠款超大显示 -->
        <div class="remaining-hero">
            <div class="remaining-label">💰 当前剩余欠款</div>
            <div class="remaining-number" id="remainingAmount">0.00 <small>元</small></div>
            <div class="remaining-note">📌 每次还款自动减少 · 新增欠款自动增加</div>
        </div>

        <!-- 双入口：还款 + 新增欠款 -->
        <div class="double-form">
            <!-- 左侧：还款 -->
            <div class="form-box">
                <div class="form-title">💸 记录还款</div>
                <div class="form-row">
                    <input type="date" id="repayDate" placeholder="日期">
                    <input type="number" id="repayAmount" step="0.01" placeholder="还款金额">
                </div>
                <div class="form-row">
                    <input type="text" id="repayNote" placeholder="备注（可选）">
                    <button class="btn" id="addRepayBtn">✨ 记录还款</button>
                </div>
            </div>
            <!-- 右侧：新增欠款 -->
            <div class="form-box">
                <div class="form-title">📈 新增欠款</div>
                <div class="form-row">
                    <input type="date" id="debtDate" placeholder="日期">
                    <input type="number" id="debtAmount" step="0.01" placeholder="新增欠款金额">
                </div>
                <div class="form-row">
                    <input type="text" id="debtNote" placeholder="备注（例如：借款/消费）">
                    <button class="btn" id="addDebtBtn">➕ 新增欠款</button>
                </div>
            </div>
        </div>

        <!-- 双图表 -->
        <div class="charts-row">
            <div class="chart-box card" style="padding: 1rem;">
                <h3>📊 还款/欠款流水</h3>
                <canvas id="flowChart" width="400" height="300"></canvas>
                <div style="margin-top:0.5rem; text-align:center; font-size:0.75rem;">绿色=还款 | 红色=新增欠款</div>
            </div>
            <div class="chart-box card" style="padding: 1rem;">
                <h3>🔮 剩余欠款趋势</h3>
                <canvas id="remainingChart" width="400" height="300"></canvas>
                <div style="margin-top:0.8rem; background:#ebf4ef; border-radius:1.5rem; padding:0.5rem; text-align:center;">
                    <span id="trendText">📌 记录还款和欠款，趋势自动更新</span>
                </div>
            </div>
        </div>

        <!-- 月度汇总 + 明细表格 -->
        <div class="card" style="margin-top:0.5rem;">
            <div style="display:flex; justify-content:space-between; flex-wrap:wrap; margin-bottom:1rem;">
                <h3>🗓️ 月度汇总 & 全部流水</h3>
                <span class="badge">💚 还款为负向，欠款为正向</span>
            </div>
            <div id="monthlySummary" style="margin-bottom:1.2rem;"></div>
            <div style="overflow-x:auto;">
                <table>
                    <thead><tr><th>日期</th><th>类型</th><th>金额(¥)</th><th>备注</th><th></th></tr></thead>
                    <tbody id="recordsTbody"></tbody>
                </table>
            </div>
        </div>
        <div class="footer-note">🍀 所有数据保存在浏览器 · 还款减少欠款 · 新增欠款增加欠款 · 自动计算剩余</div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'dynamic_debt_tracker';
    let records = [];      // 每一条记录：{ id, date, type, amount, note }  type: 'repay' 或 'new_debt'
    let currentRemaining = 0;

    // DOM
    const remainingSpan = document.getElementById('remainingAmount');
    const repayDate = document.getElementById('repayDate');
    const repayAmount = document.getElementById('repayAmount');
    const repayNote = document.getElementById('repayNote');
    const addRepayBtn = document.getElementById('addRepayBtn');
    const debtDate = document.getElementById('debtDate');
    const debtAmount = document.getElementById('debtAmount');
    const debtNote = document.getElementById('debtNote');
    const addDebtBtn = document.getElementById('addDebtBtn');
    const recordsTbody = document.getElementById('recordsTbody');
    const monthlySummaryDiv = document.getElementById('monthlySummary');
    const exportCsvBtn = document.getElementById('exportCsvBtn');
    const exportExcelBtn = document.getElementById('exportExcelBtn');
    const resetBtn = document.getElementById('resetBtn');
    const trendText = document.getElementById('trendText');

    let flowChart = null, remainingChart = null;

    function setDefaultDate() {
        const today = new Date().toISOString().slice(0,10);
        if(!repayDate.value) repayDate.value = today;
        if(!debtDate.value) debtDate.value = today;
    }
    setDefaultDate();

    function loadData() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if(stored) {
            try {
                const data = JSON.parse(stored);
                records = data.records || [];
                currentRemaining = data.currentRemaining || 0;
            } catch(e) { initDefault(); }
        } else {
            initDefault();
        }
        records.sort((a,b)=> new Date(a.date) - new Date(b.date));
        renderAll();
    }

    function initDefault() {
        // 示例：初始欠款20000，还款两笔
        records = [
            { id: 'init1', date: '2026-03-10', type: 'new_debt', amount: 20000, note: '初始总欠款' },
            { id: 'init2', date: '2026-03-15', type: 'repay', amount: 1500, note: '首次还款' },
            { id: 'init3', date: '2026-03-22', type: 'repay', amount: 2000, note: '工资还款' },
        ];
        // 计算剩余欠款：新增欠款总和 - 还款总和
        let totalDebt = 0, totalRepay = 0;
        records.forEach(r => {
            if(r.type === 'new_debt') totalDebt += r.amount;
            else if(r.type === 'repay') totalRepay += r.amount;
        });
        currentRemaining = totalDebt - totalRepay;
        if(currentRemaining < 0) currentRemaining = 0;
        saveToLocal();
    }

    function saveToLocal() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ records, currentRemaining }));
    }

    function recalcRemaining() {
        let totalDebt = 0, totalRepay = 0;
        records.forEach(r => {
            if(r.type === 'new_debt') totalDebt += r.amount;
            else if(r.type === 'repay') totalRepay += r.amount;
        });
        currentRemaining = totalDebt - totalRepay;
        if(currentRemaining < 0) currentRemaining = 0;
        remainingSpan.innerText = currentRemaining.toFixed(2);
        saveToLocal();
        return currentRemaining;
    }

    function addRecord(type, date, amount, note) {
        if(!date) { alert('请选择日期'); return false; }
        if(isNaN(amount) || amount <= 0) { alert('请输入大于0的金额'); return false; }
        const newRecord = {
            id: Date.now() + '' + Math.random(),
            date: date,
            type: type,
            amount: amount,
            note: note.trim() || (type === 'repay' ? '还款' : '新增欠款')
        };
        records.push(newRecord);
        records.sort((a,b)=> new Date(a.date) - new Date(b.date));
        recalcRemaining();
        renderAll();
        return true;
    }

    function deleteRecord(id) {
        records = records.filter(r => r.id != id);
        recalcRemaining();
        renderAll();
    }

    function renderCharts() {
        const sorted = [...records].sort((a,b)=> new Date(a.date) - new Date(b.date));
        const labels = sorted.map(r => r.date.slice(5));
        const repayData = sorted.map(r => r.type === 'repay' ? r.amount : 0);
        const debtData = sorted.map(r => r.type === 'new_debt' ? r.amount : 0);
        
        // 流水图
        const ctx1 = document.getElementById('flowChart').getContext('2d');
        if(flowChart) flowChart.destroy();
        flowChart = new Chart(ctx1, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: '还款金额 (减少欠款)', data: repayData, backgroundColor: '#7bc49a', borderRadius: 6 },
                    { label: '新增欠款 (增加欠款)', data: debtData, backgroundColor: '#e0a878', borderRadius: 6 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: true, plugins: { tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${ctx.raw.toFixed(2)} 元` } } } }
        });

        // 剩余欠款趋势图：每次事件后剩余欠款变化
        let runningDebt = 0;
        let timelinePoints = [];
        let timelineLabels = [];
        for(let r of sorted) {
            if(r.type === 'new_debt') runningDebt += r.amount;
            else if(r.type === 'repay') runningDebt -= r.amount;
            if(runningDebt < 0) runningDebt = 0;
            timelinePoints.push(runningDebt);
            timelineLabels.push(r.date.slice(5));
        }
        const ctx2 = document.getElementById('remainingChart').getContext('2d');
        if(remainingChart) remainingChart.destroy();
        remainingChart = new Chart(ctx2, {
            type: 'line',
            data: {
                labels: timelineLabels,
                datasets: [{ label: '剩余欠款金额', data: timelinePoints, borderColor: '#2f8b60', backgroundColor: 'rgba(47,139,96,0.1)', fill: true, tension: 0.2, pointRadius: 4 }]
            },
            options: { responsive: true, plugins: { tooltip: { callbacks: { label: (ctx) => `剩余欠款: ${ctx.raw.toFixed(2)} 元` } } } }
        });
        if(timelinePoints.length === 0) trendText.innerText = '📌 暂无流水，添加还款或新增欠款后显示趋势';
        else trendText.innerText = `📈 当前剩余欠款 ${currentRemaining.toFixed(2)} 元，${timelinePoints.length} 次变动记录`;
    }

    function renderTableAndMonthly() {
        if(records.length === 0) {
            recordsTbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">暂无记录，点击上方添加还款或新增欠款</td></tr>';
            monthlySummaryDiv.innerHTML = '<span>暂无数据</span>';
            return;
        }
        // 表格
        let html = '';
        records.forEach(rec => {
            const typeName = rec.type === 'repay' ? '💸 还款' : '📈 新增欠款';
            const amountCls = rec.type === 'repay' ? 'style="color:#2c8e5c;"' : 'style="color:#c9795e;"';
            html += `<tr>
                        <td>${rec.date}</td>
                        <td>${typeName}</td>
                        <td ${amountCls}>¥ ${rec.amount.toFixed(2)}</td>
                        <td>${escapeHtml(rec.note)}</td>
                        <td><button class="delete-btn" data-id="${rec.id}">🗑️</button></td>
                     </tr>`;
        });
        recordsTbody.innerHTML = html;
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => deleteRecord(btn.getAttribute('data-id')));
        });

        // 月度汇总：按月份聚合 净变化 = 新增欠款 - 还款
        const monthMap = new Map();
        records.forEach(rec => {
            const ym = rec.date.slice(0,7);
            let change = 0;
            if(rec.type === 'new_debt') change = rec.amount;
            else if(rec.type === 'repay') change = -rec.amount;
            monthMap.set(ym, (monthMap.get(ym) || 0) + change);
        });
        let monthlyHtml = '<div style="display:flex; flex-wrap:wrap; gap:0.7rem;">';
        for(let [ym, net] of [...monthMap.entries()].sort()) {
            const netColor = net >=0 ? '#c9795e' : '#2c8e5c';
            const sign = net >=0 ? '+' : '';
            monthlyHtml += `<div style="background:#eef3ef; border-radius:1.5rem; padding:0.2rem 1rem;"><strong>${ym}</strong> <span style="color:${netColor};">净变动 ${sign}${net.toFixed(2)} 元</span></div>`;
        }
        monthlyHtml += '</div>';
        monthlySummaryDiv.innerHTML = monthlyHtml;
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    function renderAll() {
        renderTableAndMonthly();
        renderCharts();
        remainingSpan.innerText = currentRemaining.toFixed(2);
    }

    function exportCSV() {
        let content = "日期,类型,金额(元),备注\n";
        records.forEach(r => {
            content += `${r.date},${r.type === 'repay' ? '还款' : '新增欠款'},${r.amount},"${r.note.replace(/"/g, '""')}"\n`;
        });
        const blob = new Blob(["\uFEFF" + content], {type: "text/csv;charset=utf-8;"});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = "欠款流水.csv";
        link.click();
        URL.revokeObjectURL(link.href);
    }

    function exportExcel() {
        const sheetData = records.map(r => ({ '日期': r.date, '类型': r.type === 'repay' ? '还款' : '新增欠款', '金额(元)': r.amount, '备注': r.note }));
        const ws = XLSX.utils.json_to_sheet(sheetData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "欠款流水");
        XLSX.writeFile(wb, `欠款记录_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    function resetAll() {
        if(confirm('⚠️ 重置将删除所有记录，恢复初始示例数据，确定吗？')) {
            initDefault();
            recalcRemaining();
            renderAll();
        }
    }

    // 事件绑定
    addRepayBtn.addEventListener('click', () => {
        const date = repayDate.value;
        const amount = parseFloat(repayAmount.value);
        const note = repayNote.value;
        if(addRecord('repay', date, amount, note)) {
            repayAmount.value = '';
            repayNote.value = '';
            setDefaultDate();
        }
    });
    addDebtBtn.addEventListener('click', () => {
        const date = debtDate.value;
        const amount = parseFloat(debtAmount.value);
        const note = debtNote.value;
        if(addRecord('new_debt', date, amount, note)) {
            debtAmount.value = '';
            debtNote.value = '';
            setDefaultDate();
        }
    });
    exportCsvBtn.addEventListener('click', exportCSV);
    exportExcelBtn.addEventListener('click', exportExcel);
    resetBtn.addEventListener('click', resetAll);

    loadData();
</script>
</body>
</html>
